[deepseek]
api_key = ""
model = "deepseek-reasoner"
max_simultaneous = 3
stream = true
thinking_enabled = true
reasoning_effort = "high"

[[inference]]
default = true
type = "modal"
name = "ideogram-fp8"
url = "https://your-modal-endpoint.modal.run"
proxy_auth_key = ""
proxy_auth_secret = ""
max_simultaneous = 2

[database]
url = "sqlite:///app/db/ideoui.db"

[r2]
account_id = "garage-local"
access_key_id = "INSERT_YOUR_GARAGE_ACCESS_KEY"
secret_access_key = "INSERT_YOUR_GARAGE_SECRET_KEY"
bucket_name = "ideoui"
public_url = "http://localhost:3902/ideoui"